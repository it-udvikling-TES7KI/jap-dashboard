variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - deploy

build-app:
  stage: build
  image: harbor.rsyd.net/jap/rsyd-base-images/jdk21-build:latest
  variables:
    GRADLE_OPTS: "-Dorg.gradle.warning.mode=all"
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/**/TEST-*.xml
      coverage_report:
        coverage_format: jacoco
        path: build/reports/jacoco/test/jacocoTestReport.xml
    paths:
      - build/
      - .gradle
    expire_in: 1 week
  script:
    - gradle --build-cache --console plain build dockerCreateDockerfile
  allow_failure: false
  coverage: '/Total.*?([0-9]{1,3})%/'

build-docker:
  before_script:
    - echo "$HARBOR_PASS" | docker login -u "$HARBOR_USER" "$HARBOR_HOST" --password-stdin
  services:
    - name: docker:28.2.2-dind
      command: [ "--registry-mirror", "https://prappdrc01v.rsyd.net" ]
  stage: build
  needs:
    - build-app
  image: harbor.rsyd.net/jap/rsyd-base-images/jdk21-build:latest
  variables:
    GRADLE_OPTS: "-Dorg.gradle.warning.mode=all"
  script:
    - ls -laR
    - gradle --build-cache -console plain dockerPushImage
  allow_failure: false
  after_script:
    - docker logout $HARBOR_HOST

# Our own staging environment
deploy-staging:
  stage: deploy
  image: harbor.rsyd.net/library/nomad-deploy:latest
  variables:
    NODE_CLASS: "prod-internal"
    NOMAD_ENV: "staging"
    MICRONAUT_ENVIRONMENTS: "staging"
    JAP_DNS_BASE: "jap.rsyd.net"
    EXPOSE_TO_INTERNET: "false"
    LOADBALANCER_STICKY_COOKIE: "false"
    IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  script:
    - envsubst < job.nomad > $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
    - cat $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
    - nomad validate $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
    - nomad plan $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad || if [ $? -eq 255 ]; then exit 255; else echo "success"; fi
    - nomad run $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
  environment:
    name: staging
  dependencies: []
  allow_failure: false
  when: manual

# Production
deploy-production:
  stage: deploy
  image: harbor.rsyd.net/library/nomad-deploy:latest
  variables:
    NODE_CLASS: "prod-internal"
    NOMAD_ENV: "prod"
    MICRONAUT_ENVIRONMENTS: "prod"
    JAP_DNS_BASE: "jap.rsyd.dk"
    EXPOSE_TO_INTERNET: "false"
    LOADBALANCER_STICKY_COOKIE: "false"
    IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  script:
    - envsubst < job.nomad > $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
    - cat $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
    - nomad validate $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
    - nomad plan $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad || if [ $? -eq 255 ]; then exit 255; else echo "success"; fi
    - nomad run $CI_COMMIT_SHORT_SHA_$CI_PROJECT_NAME.nomad
  environment:
    name: production
  dependencies: []
  allow_failure: false
  when: manual
  only:
    - tags
#dette beskriver navnet på branchen, ikke hvorvidt "master" branchen er default.
    #- master
