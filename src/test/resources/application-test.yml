app:
  foo: bar
  authentication:
    host: ${KERBEROS_LOGIN_SERVICE:`http://localhost:8888`}
    roles-required:
      -
endpoints:
  info:
    sensitive: false
  routes:
    sensitive: false
  loggers:
    sensitive: false
  env:
    sensitive: false
  threaddump:
    sensitive: false
    flyway:
      enabled: true
      sensitive: false

