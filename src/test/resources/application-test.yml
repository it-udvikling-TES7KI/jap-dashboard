---
micronaut:
  security:
    token:
      jwt: #The below is only enabled to be able to create tokens in test
        enabled: true
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET:`pleaseChangeThisSecretForANewOne`}
        generator: #used only in test
          refresh-token:
            enabled: true
            secret: ${JWT_SECRET:`pleaseChangeThisSecretForANewOne`}
---
logger:
  levels:
    io.micronaut.data.query: TRACE
